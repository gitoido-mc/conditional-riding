#file: noinspection SpellCheckingInspection
name: Build and publish project artifacts on platforms
on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  cobblemon: 1.7.3
  project_name: conditional_riding
  curseforge_id: 1489855
  modrinth_id: bS53FEgC

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      matrix:
        # Use these Java versions
        java: [
          21,    # Current Java LTS
        ]
    outputs:
      version: ${{ steps.version.outputs.MOD_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - name: Build
        uses: burrunan/gradle-cache-action@v3
        with:
          read-only: true
          arguments: build
      - name: Save version output
        id: version
        run: echo "MOD_VERSION=$(gradle currentVersion -q -Prelease.quiet)" >> "$GITHUB_OUTPUT"
      - name: Capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            */build/libs/${{ env.project_name }}-${{ matrix.loader }}-${{ steps.version.outputs.MOD_VERSION }}.jar
            */build/libs/${{ env.project_name }}-${{ matrix.loader }}-${{ steps.version.outputs.MOD_VERSION }}-sources.jar

  publish:
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        loader: [
          fabric,
          neoforge,
        ]
    steps:
      - name: Retrieve build artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: build/libs/
      - name: Display structure of downloaded files
        if: github.event_name != 'release'
        run: ls -R
      - name: Publish ${{ matrix.loader }} version (CurseForge/Modrinth)
        if: github.event_name == 'release'
        uses: Kira-NT/mc-publish@v3.3
        with:
          name: "Conditional Riding ${{ needs.build.outputs.version }} for Cobblemon ${{ env.cobblemon }}"
          version: "${{ env.cobblemon }}_${{ needs.build.outputs.version }}"
          version-type: release

          curseforge-id: ${{ env.curseforge_id }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          modrinth-id: ${{ env.modrinth_id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: |
            build/libs/${{ env.project_name }}-${{ matrix.loader }}-${{ needs.build.outputs.version }}.jar
            build/libs/${{ env.project_name }}-${{ matrix.loader }}-${{ needs.build.outputs.version }}-sources.jar 

          loaders: ${{ matrix.loader }}

          game-versions: 1.21.1
          java: 21

          dependencies: |
            architectury-api(required){curseforge:419699}{modrinth:lhGA9TYQ}
            cobblemon@1.7.0(required){curseforge:687131}{modrinth:MdwFAVRL}
